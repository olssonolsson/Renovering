<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renovering - Admin Panel</title>
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0ede8;--border:#e8e6e0;--border2:#ccc;--text:#1a1a1a;--text2:#666;--text3:#aaa;--accent:#1a1a1a;--accent-txt:#fff;--danger:#c0392b;--danger-bg:#fff8f7;--danger-bd:#e8d0ce;--ok-bg:#e8f5e9;--ok-bd:#81c784;--ok-txt:#2e7d32;--tag-bg:#f0ede8;}
.dark{--bg:#111;--surface:#1c1c1e;--surface2:#2c2c2e;--border:#3a3a3c;--border2:#555;--text:#f0f0f0;--text2:#aaa;--text3:#666;--accent:#f0f0f0;--accent-txt:#111;--danger:#ff6b6b;--danger-bg:#2c1a1a;--danger-bd:#5a2a2a;--ok-bg:#1a2e1a;--ok-bd:#388e3c;--ok-txt:#81c784;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .2s,color .2s;}

.topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;height:52px;}
.app-title{font-size:16px;font-weight:600;color:var(--text);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.dark-btn{background:none;border:.5px solid var(--border2);border-radius:20px;padding:4px 10px;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;white-space:nowrap;}
.dark-btn:hover{background:var(--surface2);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#81c784;display:inline-block;margin-right:6px;}

.main-container{display:flex;height:calc(100vh - 52px);}
.sidebar{width:200px;background:var(--surface);border-right:.5px solid var(--border);padding:1rem;overflow-y:auto;}
.sidebar-section{margin-bottom:1.5rem;}
.sidebar-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
.sidebar-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);border:.5px solid transparent;margin-bottom:4px;transition:all .15s;}
.sidebar-item:hover{background:var(--surface2);color:var(--text);}
.sidebar-item.active{background:var(--accent);color:var(--accent-txt);border-color:var(--accent);}
.sidebar-item .count{font-size:11px;color:var(--text3);margin-left:auto;display:inline-block;}

.content{flex:1;overflow-y:auto;padding:1.5rem;}

.section{display:none;}
.section.active{display:block;}

.section-title{font-size:20px;font-weight:600;margin-bottom:1.5rem;color:var(--text);}

/* Images Grid */
.images-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:1.5rem;margin-top:1.5rem;}
.image-card{background:var(--surface);border:.5px solid var(--border);border-radius:10px;overflow:hidden;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column;}
.image-card:hover{transform:translateY(-2px);border-color:var(--border2);box-shadow:0 4px 12px rgba(0,0,0,.1);}
.image-card.editing{background:var(--surface2);box-shadow:0 0 0 2px var(--accent);}
.image-preview-container{position:relative;width:100%;aspect-ratio:1;overflow:hidden;background:var(--surface2);}
.image-preview{width:100%;height:100%;object-fit:cover;display:block;}
.image-card-content{padding:1rem;flex:1;display:flex;flex-direction:column;}
.image-field-row{margin-bottom:0.8rem;}
.image-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;display:block;}
.image-value{font-size:12px;color:var(--text2);}
.image-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:1rem;}
.image-info-item{font-size:11px;}
.image-info-label{font-size:9px;color:var(--text3);font-weight:600;}
.image-info-text{color:var(--text2);margin-top:2px;word-break:break-word;}
.image-actions{display:flex;gap:6px;margin-top:auto;}
.image-btn{padding:6px 10px;border:.5px solid var(--border2);border-radius:4px;background:var(--surface);color:var(--text2);font-size:11px;cursor:pointer;font-family:inherit;transition:background .15s;flex:1;text-align:center;}
.image-btn:hover{background:var(--surface2);}
.image-btn.edit{background:var(--accent);color:var(--accent-txt);border-color:var(--accent);}
.image-btn.edit:hover{opacity:.85;}
.image-btn.delete{color:var(--danger);border-color:var(--danger-bd);background:var(--danger-bg);}
.image-btn.delete:hover{opacity:.85;}

.controls-bar{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:flex-end;}
.controls-bar > div{flex:1;min-width:150px;}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:4px;}
.form-select,.search-input{width:100%;padding:8px 10px;border:.5px solid var(--border2);border-radius:6px;font-size:13px;font-family:inherit;outline:none;background:var(--surface);color:var(--text);}
.form-select:focus,.search-input:focus{border-color:var(--accent);}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:1rem;overflow-y:auto;}
.modal-bg.open{display:flex;}
.modal{background:var(--surface);border-radius:14px;padding:1.5rem;width:100%;max-width:700px;border:.5px solid var(--border);margin:auto;}
.modal h2{font-size:18px;font-weight:600;margin-bottom:1.25rem;color:var(--text);}
.modal-image-preview{width:100%;max-height:300px;object-fit:contain;border-radius:8px;margin-bottom:1.5rem;border:.5px solid var(--border);}
.form-group{margin-bottom:1.25rem;}
.form-label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px;}
.form-input,.form-textarea{width:100%;padding:8px 10px;border:.5px solid var(--border2);border-radius:6px;font-size:13px;font-family:inherit;outline:none;background:var(--surface);color:var(--text);}
.form-input:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:70px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;flex-wrap:wrap;}
.btn{padding:8px 16px;border:.5px solid var(--border2);border-radius:6px;background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;font-family:inherit;transition:background .15s;}
.btn:hover{background:var(--surface2);}
.btn-primary{background:var(--accent);color:var(--accent-txt);border-color:var(--accent);}
.btn-primary:hover{opacity:.85;}
.btn-danger{color:var(--danger);border-color:var(--danger-bd);background:var(--danger-bg);}

.tag{display:inline-block;padding:3px 8px;border-radius:12px;background:var(--tag-bg);color:var(--text2);font-size:11px;margin-right:4px;}

.loading{text-align:center;padding:2rem;color:var(--text3);}
.empty-state{text-align:center;padding:2rem;color:var(--text3);}

/* Activity Log Styles */
.activity-list{display:flex;flex-direction:column;gap:1rem;margin-top:1.5rem;}
.activity-item{background:var(--surface);border:.5px solid var(--border);border-radius:10px;padding:1.25rem;transition:transform .15s,box-shadow .15s;}
.activity-item:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.activity-item.added{border-left:3px solid #81c784;}
.activity-item.updated{border-left:3px solid #ffb74d;}
.activity-item.deleted{border-left:3px solid #ff6b6b;}
.activity-item.image{border-left:3px solid #4fc3f7;}
.activity-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.75rem;gap:1rem;}
.activity-title{font-size:14px;font-weight:600;color:var(--text);flex:1;}
.activity-time{font-size:12px;color:var(--text3);white-space:nowrap;}
.activity-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:0.75rem;}
.activity-badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;}
.activity-badge.added{background:#e8f5e9;color:#2e7d32;}
.activity-badge.updated{background:#fff8f7;color:#c0392b;}
.activity-badge.deleted{background:#2c1a1a;color:#ff6b6b;}
.activity-badge.image{background:#e0f2f1;color:#00695c;}
.activity-collection{display:inline-block;padding:3px 8px;border-radius:4px;background:var(--tag-bg);color:var(--text2);font-size:11px;}
.activity-content{font-size:13px;color:var(--text2);line-height:1.5;}
.activity-details{background:var(--surface2);border:.5px solid var(--border);border-radius:6px;padding:0.75rem;margin-top:0.75rem;font-size:12px;color:var(--text2);font-family:monospace;overflow-x:auto;}
.activity-details-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:0.5rem;}
.activity-details-item{margin-bottom:0.5rem;}
.activity-details-item:last-child{margin-bottom:0;}
.activity-field{color:var(--text3);}
.activity-value{color:var(--accent);word-break:break-word;}

@media(max-width:768px){
  .main-container{flex-direction:column;}
  .sidebar{width:100%;border-right:none;border-bottom:.5px solid var(--border);height:auto;overflow-x:auto;display:flex;padding:0.5rem;gap:1rem;}
  .sidebar-section{margin-bottom:0;}
  .sidebar-item{white-space:nowrap;}
  .images-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}
  .controls-bar{flex-direction:column;}
  .controls-bar > div{width:100%;}
  .activity-header{flex-direction:column;gap:0.5rem;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="app-title">🔧 Renovering Admin Panel</div>
  <div class="topbar-right">
    <span class="sync-dot" id="sync-dot" title="Synkad"></span>
    <button class="dark-btn" onclick="toggleDark()">🌙</button>
  </div>
</div>

<div class="main-container">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-title">Data</div>
      <div class="sidebar-item active" onclick="switchSection('images')">🖼️ Bilder <span class="count" id="images-count">0</span></div>
      <div class="sidebar-item" onclick="switchSection('activity')">📋 Aktivitetslogg <span class="count" id="activity-count">0</span></div>
    </div>
  </div>

  <div class="content">
    <!-- IMAGES -->
    <div id="images" class="section active">
      <div class="section-title">🖼️ Bilder</div>
      
      <div class="controls-bar">
        <div>
          <label class="form-label">Filtrera efter typ:</label>
          <select id="image-type-filter" class="form-select" onchange="filterImages()">
            <option value="">Alla typer</option>
            <option value="actionPhotos">Åtgärd</option>
            <option value="colorPhotos">Färg</option>
            <option value="paintCanPhotos">Färgburk</option>
          </select>
        </div>
        <div>
          <label class="form-label">Filtrera efter åtgärd:</label>
          <select id="image-entry-filter" class="form-select" onchange="filterImages()">
            <option value="">Alla åtgärder</option>
          </select>
        </div>
        <div>
          <label class="form-label">Sök:</label>
          <input type="text" id="images-search" class="search-input" placeholder="Sök efter namn..." oninput="filterImages()">
        </div>
      </div>
      
      <div id="images-grid" class="images-grid"></div>
      <div id="images-empty" class="empty-state">Laddar bilder...</div>
    </div>

    <!-- ACTIVITY LOG -->
    <div id="activity" class="section">
      <div class="section-title">📋 Aktivitetslogg</div>
      
      <div class="controls-bar">
        <div>
          <label class="form-label">Filtrera efter typ:</label>
          <select id="activity-type-filter" class="form-select" onchange="filterActivity()">
            <option value="">Alla ändringar</option>
            <option value="added">Tillagt</option>
            <option value="updated">Ändrat</option>
            <option value="deleted">Raderat</option>
            <option value="image">Bildändringar</option>
          </select>
        </div>
        <div>
          <label class="form-label">Filtrera efter samling:</label>
          <select id="activity-collection-filter" class="form-select" onchange="filterActivity()">
            <option value="">Alla samlingar</option>
            <option value="entries">Åtgärder</option>
            <option value="rooms">Rum</option>
            <option value="todos">Todos</option>
            <option value="images">Bilder</option>
          </select>
        </div>
        <div>
          <label class="form-label">Sök:</label>
          <input type="text" id="activity-search" class="search-input" placeholder="Sök i aktiviteter..." oninput="filterActivity()">
        </div>
        <div style="display:flex;gap:6px;align-items:flex-end;">
          <button class="btn" onclick="clearActivityLog()">Rensa logg</button>
        </div>
      </div>
      
      <div id="activity-list" class="activity-list"></div>
      <div id="activity-empty" class="empty-state">Ingen aktivitet ännu</div>
    </div>

<!-- EDIT MODAL -->
<div id="edit-modal" class="modal-bg">
  <div class="modal">
    <h2 id="modal-title">Redigera bild</h2>
    <img id="modal-image-preview" class="modal-image-preview" alt="Bildförhandsvisning">
    <div id="modal-content"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Avbryt</button>
      <button class="btn btn-danger" onclick="deleteCurrentImage()">Radera</button>
      <button class="btn btn-primary" onclick="saveCurrentImage()">Spara ändringar</button>
    </div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,collection,doc,updateDoc,deleteDoc,onSnapshot,query,orderBy,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const cfg={apiKey:"AIzaSyBcOie0KQdfTDtLkUfhPfKBI0grPGqRjfg",authDomain:"renovering-8b74f.firebaseapp.com",projectId:"renovering-8b74f",storageBucket:"renovering-8b74f.firebasestorage.app",messagingSenderId:"803734789539",appId:"1:803734789539:web:dbbf3b7c08bc41dcde4e16"};
const app=initializeApp(cfg);
const db=getFirestore(app);

let entries=[];
let allImages=[];
let filteredImages=[];
let currentEditImage=null;
let activityLog=[];
let filteredActivityLog=[];

const typeLabels={actionPhotos:'Åtgärd',colorPhotos:'Färg',paintCanPhotos:'Färgburk'};

function syncing(v){document.getElementById('sync-dot').style.background=v?'#ffb74d':'#81c784';}

// Dark mode
let dark=localStorage.getItem('admin-dark')==='1';
function applyDark(){document.body.classList.toggle('dark',dark);}
window.toggleDark=()=>{dark=!dark;localStorage.setItem('admin-dark',dark?'1':'0');applyDark();};
applyDark();

function log(msg){activityLog.unshift({time:new Date().toLocaleTimeString(),msg});if(activityLog.length>100)activityLog.pop();}

function logActivity(type, collection, title, details = {}){
  const timestamp = new Date();
  const timeStr = timestamp.toLocaleTimeString('sv-SE');
  const dateStr = timestamp.toLocaleDateString('sv-SE');
  
  const activity = {
    id: Date.now() + Math.random(),
    type: type, // 'added', 'updated', 'deleted', 'image'
    collection: collection, // 'entries', 'rooms', 'todos', 'images'
    title: title,
    details: details,
    timestamp: timestamp,
    timeStr: timeStr,
    dateStr: dateStr
  };
  
  activityLog.unshift(activity);
  if(activityLog.length > 500) activityLog.pop();
  
  document.getElementById('activity-count').textContent = activityLog.length;
}

// Load entries and build image list
onSnapshot(query(collection(db,'entries'),orderBy('date','desc')),snap=>{
  entries=snap.docs.map(d=>({id:d.id,...d.data()}));
  buildImageList();
  populateEntryFilter();
});

function buildImageList(){
  allImages=[];
  entries.forEach(e=>{
    (e.actionPhotos||[]).forEach((src,idx)=>{
      allImages.push({src,type:'actionPhotos',entryId:e.id,entryName:e.name,categoryName:e.category,index:idx});
    });
    (e.colorPhotos||[]).forEach((src,idx)=>{
      allImages.push({src,type:'colorPhotos',entryId:e.id,entryName:e.name,categoryName:e.category,index:idx});
    });
    (e.paintCanPhotos||[]).forEach((src,idx)=>{
      allImages.push({src,type:'paintCanPhotos',entryId:e.id,entryName:e.name,categoryName:e.category,index:idx});
    });
  });
  document.getElementById('images-count').textContent=allImages.length;
  filterImages();
}

function populateEntryFilter(){
  const select=document.getElementById('image-entry-filter');
  const entrySet=new Set(allImages.map(img=>img.entryId));
  const entryOptions=Array.from(entrySet).map(eid=>{
    const entry=entries.find(e=>e.id===eid);
    return '<option value="'+eid+'">'+entry.name+'</option>';
  }).join('');
  select.innerHTML='<option value="">Alla åtgärder</option>'+entryOptions;
}

window.filterImages=function(){
  const typeFilter=document.getElementById('image-type-filter').value||'';
  const entryFilter=document.getElementById('image-entry-filter').value||'';
  const searchQ=(document.getElementById('images-search').value||'').toLowerCase();
  
  filteredImages=allImages;
  if(typeFilter)filteredImages=filteredImages.filter(img=>img.type===typeFilter);
  if(entryFilter)filteredImages=filteredImages.filter(img=>img.entryId===entryFilter);
  if(searchQ)filteredImages=filteredImages.filter(img=>img.entryName.toLowerCase().includes(searchQ)||img.categoryName.toLowerCase().includes(searchQ));
  
  renderImages();
}

function renderImages(){
  const grid=document.getElementById('images-grid');
  const empty=document.getElementById('images-empty');
  
  grid.innerHTML='';
  
  if(filteredImages.length===0){
    empty.style.display='block';
    empty.textContent=allImages.length===0?'Laddar bilder...':'Inga bilder hittade';
    return;
  }
  
  empty.style.display='none';
  
  filteredImages.forEach((img,idx)=>{
    const card=document.createElement('div');
    card.className='image-card';
    if(currentEditImage?.src===img.src)card.classList.add('editing');
    
    card.innerHTML=`
      <div class="image-preview-container">
        <img src="${img.src}" alt="${img.entryName}" class="image-preview">
      </div>
      <div class="image-card-content">
        <div class="image-field-row">
          <span class="image-label">Åtgärd</span>
          <div class="image-value">${img.entryName}</div>
        </div>
        <div class="image-info-grid">
          <div class="image-info-item">
            <div class="image-info-label">Typ</div>
            <div class="image-info-text">${typeLabels[img.type]}</div>
          </div>
          <div class="image-info-item">
            <div class="image-info-label">Kategori</div>
            <div class="image-info-text">${img.categoryName}</div>
          </div>
        </div>
        <div class="image-actions">
          <button class="image-btn edit" onclick="editImage(${idx})">✏️ Redigera</button>
          <button class="image-btn delete" onclick="deleteImageDirect(${idx})">🗑️ Radera</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

window.editImage=function(idx){
  if(idx<0||idx>=filteredImages.length)return;
  currentEditImage={...filteredImages[idx],originalIndex:idx};
  
  const modalContent=document.getElementById('modal-content');
  const typeLabel=typeLabels[currentEditImage.type];
  
  modalContent.innerHTML=`
    <div class="form-group">
      <label class="form-label">Åtgärd/Projekt</label>
      <input type="text" class="form-input" value="${currentEditImage.entryName}" disabled style="background:var(--surface2);color:var(--text3);">
    </div>
    
    <div class="form-group">
      <label class="form-label">Bildtyp</label>
      <select id="edit-type" class="form-select">
        <option value="actionPhotos" ${currentEditImage.type==='actionPhotos'?'selected':''}>Åtgärd</option>
        <option value="colorPhotos" ${currentEditImage.type==='colorPhotos'?'selected':''}>Färg</option>
        <option value="paintCanPhotos" ${currentEditImage.type==='paintCanPhotos'?'selected':''}>Färgburk</option>
      </select>
    </div>
    
    <div class="form-group">
      <label class="form-label">Kategori</label>
      <input type="text" class="form-input" id="edit-category" value="${currentEditImage.categoryName}" placeholder="Tex: Målning, Golv, Belysning...">
    </div>
  `;
  
  document.getElementById('modal-title').textContent='Redigera bild - '+currentEditImage.entryName;
  document.getElementById('modal-image-preview').src=currentEditImage.src;
  openModal();
}

window.saveCurrentImage=async function(){
  if(!currentEditImage)return;
  
  const newType=document.getElementById('edit-type').value;
  const entry=entries.find(e=>e.id===currentEditImage.entryId);
  if(!entry)return;
  
  syncing(true);
  
  try{
    const oldPhotos=[...entry[currentEditImage.type]];
    const img=oldPhotos.splice(currentEditImage.index,1)[0];
    
    const newPhotos=[...(entry[newType]||[]),img];
    
    const update={};
    update[currentEditImage.type]=oldPhotos;
    update[newType]=newPhotos;
    
    await updateDoc(doc(db,'entries',currentEditImage.entryId),update);
    
    logActivity('image', 'images', 'Bildtyp ändrad', {
      entry: currentEditImage.entryName,
      from: typeLabels[currentEditImage.type],
      to: typeLabels[newType]
    });
    
    syncing(false);
    closeModal();
  }catch(e){
    console.error('Error saving:',e);
    alert('Fel vid sparande: '+e.message);
    syncing(false);
  }
}

window.deleteCurrentImage=async function(){
  if(!currentEditImage)return;
  if(!confirm('Är du säker på att du vill radera denna bild?'))return;
  
  const entry=entries.find(e=>e.id===currentEditImage.entryId);
  if(!entry)return;
  
  syncing(true);
  
  try{
    const photos=[...entry[currentEditImage.type]];
    photos.splice(currentEditImage.index,1);
    
    const update={};
    update[currentEditImage.type]=photos;
    
    await updateDoc(doc(db,'entries',currentEditImage.entryId),update);
    
    logActivity('deleted', 'images', 'Bild raderad', {
      entry: currentEditImage.entryName,
      type: typeLabels[currentEditImage.type]
    });
    
    syncing(false);
    closeModal();
  }catch(e){
    console.error('Error deleting:',e);
    alert('Fel vid radering: '+e.message);
    syncing(false);
  }
}

window.deleteImageDirect=async function(idx){
  if(idx<0||idx>=filteredImages.length)return;
  if(!confirm('Är du säker på att du vill radera denna bild?'))return;
  
  const img=filteredImages[idx];
  const entry=entries.find(e=>e.id===img.entryId);
  if(!entry)return;
  
  syncing(true);
  
  try{
    const photos=[...entry[img.type]];
    photos.splice(img.index,1);
    
    const update={};
    update[img.type]=photos;
    
    await updateDoc(doc(db,'entries',img.entryId),update);
    
    logActivity('deleted', 'images', 'Bild raderad', {
      entry: img.entryName,
      type: typeLabels[img.type]
    });
    
    syncing(false);
  }catch(e){
    console.error('Error deleting:',e);
    alert('Fel vid radering: '+e.message);
    syncing(false);
  }
}

window.switchSection=section=>{
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(section).classList.add('active');
  document.querySelectorAll('.sidebar-item').forEach(s=>s.classList.remove('active'));
  event.target.closest('.sidebar-item').classList.add('active');
  
  if(section==='activity'){
    filterActivity();
  }
};

function openModal(){
  document.getElementById('edit-modal').classList.add('open');
}

window.closeModal=function(){
  document.getElementById('edit-modal').classList.remove('open');
  currentEditImage=null;
  renderImages();
}

window.filterActivity=function(){
  const typeFilter=document.getElementById('activity-type-filter').value||'';
  const collectionFilter=document.getElementById('activity-collection-filter').value||'';
  const searchQ=(document.getElementById('activity-search').value||'').toLowerCase();
  
  filteredActivityLog=activityLog;
  if(typeFilter)filteredActivityLog=filteredActivityLog.filter(a=>a.type===typeFilter);
  if(collectionFilter)filteredActivityLog=filteredActivityLog.filter(a=>a.collection===collectionFilter);
  if(searchQ)filteredActivityLog=filteredActivityLog.filter(a=>
    a.title.toLowerCase().includes(searchQ)||
    a.details.entry?.toLowerCase().includes(searchQ)||
    a.details.from?.toLowerCase().includes(searchQ)||
    a.details.to?.toLowerCase().includes(searchQ)
  );
  
  renderActivityLog();
}

function renderActivityLog(){
  const list=document.getElementById('activity-list');
  const empty=document.getElementById('activity-empty');
  
  list.innerHTML='';
  
  if(filteredActivityLog.length===0){
    empty.style.display='block';
    list.style.display='none';
    return;
  }
  
  list.style.display='flex';
  empty.style.display='none';
  
  filteredActivityLog.forEach(activity=>{
    const item=document.createElement('div');
    item.className=`activity-item ${activity.type}`;
    
    const badgeLabels={
      'added':'Tillagt',
      'updated':'Ändrat',
      'deleted':'Raderat',
      'image':'Bildändring'
    };
    
    const collectionLabels={
      'entries':'Åtgärd',
      'rooms':'Rum',
      'todos':'Todo',
      'images':'Bild'
    };
    
    let detailsHtml='';
    if(Object.keys(activity.details).length>0){
      detailsHtml='<div class="activity-details"><div class="activity-details-title">Detaljer:</div>';
      Object.entries(activity.details).forEach(([key,value])=>{
        detailsHtml+=`<div class="activity-details-item"><span class="activity-field">${key}:</span> <span class="activity-value">${value}</span></div>`;
      });
      detailsHtml+='</div>';
    }
    
    item.innerHTML=`
      <div class="activity-header">
        <div class="activity-title">${activity.title}</div>
        <div class="activity-time">${activity.timeStr}</div>
      </div>
      <div class="activity-meta">
        <span class="activity-badge ${activity.type}">${badgeLabels[activity.type]||activity.type}</span>
        <span class="activity-collection">${collectionLabels[activity.collection]||activity.collection}</span>
        <span class="tag">${activity.dateStr}</span>
      </div>
      <div class="activity-content">
        ${detailsHtml}
      </div>
    `;
    
    list.appendChild(item);
  });
}

window.clearActivityLog=function(){
  if(!confirm('Är du säker på att du vill rensa all aktivitetshistorik?'))return;
  activityLog=[];
  filteredActivityLog=[];
  document.getElementById('activity-count').textContent='0';
  renderActivityLog();
}
</script>
